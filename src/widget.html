<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Meals Widget</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--hub-font, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      font-size: 13px;
      background: #fff;
      color: #111827;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header { display: flex; align-items: center; gap: 6px; padding: 10px 14px 8px; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
    .header-icon { font-size: 14px; }
    .header-title { font-size: 12px; font-weight: 600; color: #374151; flex: 1; }
    .header-link { font-size: 11px; color: #6366f1; text-decoration: none; }
    .header-link:hover { text-decoration: underline; }

    .content { flex: 1; padding: 10px 14px 12px; display: flex; flex-direction: column; gap: 6px; overflow: hidden; }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #9ca3af;
      text-align: center;
    }
    .empty .icon { font-size: 1.8rem; }
    .empty p { font-size: 12px; }

    .meal-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .meal-row:last-child { border-bottom: none; }

    .meal-date { font-size: 11px; color: #6b7280; width: 48px; flex-shrink: 0; }
    .meal-slot { font-size: 1.1rem; width: 22px; text-align: center; flex-shrink: 0; }
    .meal-name { flex: 1; font-weight: 500; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .meal-assignee { font-size: 11px; color: #9ca3af; white-space: nowrap; }
  </style>
</head>
<body>

<div class="header">
  <span class="header-icon">🍽️</span>
  <span class="header-title">Meals</span>
  <a class="header-link" href="/run/family-meals">Open</a>
</div>

<div class="content" id="content">
  <div class="empty">
    <p>Loading…</p>
  </div>
</div>

<script type="module">
import { esc } from "/hub-sdk.js";

const DB      = window.__DB_URL      ?? "";
const CONTEXT = window.__CONTEXT_URL ?? "";

const SLOT_ICONS = { breakfast: "🥣", lunch: "🥪", dinner: "🍲", snack: "🍎" };

async function db(sql, params = []) {
  if (!DB) return { rows: [] };
  const res = await fetch(DB, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sql, params }),
  });
  return res.json();
}

function formatDate(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString(undefined, { weekday: "short", day: "numeric" });
}

async function init() {
  let members = [];
  if (CONTEXT) {
    try {
      const res = await fetch(`${CONTEXT}?keys=family.members`);
      members = ((await res.json())["family.members"]) ?? [];
    } catch {}
  }
  const memberMap = new Map(members.map(m => [m.id, m]));

  const now = new Date();
  const today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;

  const SLOT_ORDER = { breakfast: 1, lunch: 2, dinner: 3 };

  const { rows: meals } = await db(`
    SELECT id, plan_date, slot, meal_name, recipe_id, assigned_to, notes, created_at
    FROM app_family_meals__meal_plan
    WHERE plan_date >= ?
    ORDER BY plan_date
    LIMIT 100
  `, [today]);

  meals.sort((a, b) => {
    if (a.plan_date !== b.plan_date) return a.plan_date < b.plan_date ? -1 : 1;
    return (SLOT_ORDER[a.slot] ?? 9) - (SLOT_ORDER[b.slot] ?? 9);
  });
  if (!meals.length) {
    document.getElementById("content").innerHTML = `
      <div class="empty">
        <span class="icon">🍽️</span>
        <p>No meals planned</p>
      </div>
    `;
    return;
  }

  const upcoming = meals.slice(0, 4);

  const content = document.getElementById("content");
  content.innerHTML = upcoming.map(m => {
    const assignee = m.assigned_to ? memberMap.get(m.assigned_to)?.name : null;
    return `
      <div class="meal-row">
        <span class="meal-date">${esc(formatDate(m.plan_date))}</span>
        <span class="meal-slot">${SLOT_ICONS[m.slot] || "🍽️"}</span>
        <span class="meal-name">${esc(m.meal_name)}</span>
        ${assignee ? `<span class="meal-assignee">${esc(assignee)}</span>` : ""}
      </div>
    `;
  }).join("");
}

init();
</script>
</body>
</html>
